# vim:fileencoding=utf-8:foldmethod=marker

# Filesystem scanning {{{

# Show hidden files by default (dotfiles)
show_hidden yes

# Sort by name, not last modified
sort_by_last_modified no

# Respect .gitignore and .ignore files
respect_ignores yes

# }}}

# Appearance {{{

# Show file preview panel
show_preview yes

# Syntax highlighting for dark background
dark_pygments_style github-dark

# }}}

# Keyboard shortcuts {{{

map ctrl+j next 1
map ctrl+k next -1

# Directory bookmarks
map ctrl+t cd /tmp
map alt+g  cd ~/git
map alt+d  cd ~/Downloads

# }}}
