# crush embedded tmux config — no prefix, transparent key passthrough.
# This config is used when crush auto-starts a dedicated tmux session.
# Customize freely — crush will not overwrite this file once created.

set -ga terminal-overrides ",*:RGB"
set -g default-shell /bin/bash
set -g default-command $SHELL
set -g escape-time 0
set -g focus-events on
set -g allow-passthrough on
set -g xterm-keys on
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path} - #{s/^CC . //:pane_title}'
set -g aggressive-resize on
set -g visual-bell off
set -g window-size latest
set -g mouse on
set -g prefix None
set -g prefix2 None
set -g detach-on-destroy off
set -g renumber-windows on

# Status bar — minimal, shows window list (pink accent for crush)
set -g status on
set -g status-position top
set -g status-style 'bg=#1a1a2e,fg=#ffffd7'
set -g status-left '#[fg=#e91e63,bold] [C] #[default]'
set -g status-left-length 6
set -g status-right '#[fg=#aaaaaa] #(whoami)@#h '
set -g status-right-length 60
set -g status-justify left
set -g window-status-format '#[fg=#585858] #I #W '
set -g window-status-current-format '#[fg=#e91e63,bold] #I #W '
set -g window-status-separator ''

set -g window-active-style 'bg=#141414'

# C-j / C-k → Down / Up (for fzf, crush list navigation, etc.)
bind -n C-j send-keys Down
bind -n C-k send-keys Up

# C-h / C-l → Left / Right
bind -n C-h send-keys Left
bind -n C-l send-keys Right

# C-o → C-k (kill to end of line, since C-k is remapped above)
bind -n C-o send-keys C-k

# Tab cycling
bind -n S-F9 previous-window
bind -n S-F10 next-window
bind -n M-9 previous-window
bind -n M-0 next-window

# Direct window switching (Alt-1 through Alt-8)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8

# Mobile menu — tap [C] in status bar or press Insert to access all actions
bind -n MouseDown1StatusLeft display-menu -T '#[fg=#e91e63,bold] Actions ' -x 0 -y S \
  'Prev Window'              p 'previous-window' \
  'Next Window'              n 'next-window' \
  '' \
  'Window 1'                 1 'select-window -t 1' \
  'Window 2'                 2 'select-window -t 2' \
  'Window 3'                 3 'select-window -t 3' \
  'Window 4'                 4 'select-window -t 4' \
  'Window 5'                 5 'select-window -t 5' \
  'Window 6'                 6 'select-window -t 6' \
  'Window 7'                 7 'select-window -t 7' \
  'Window 8'                 8 'select-window -t 8' \
  '' \
  'Rename Window'            r 'command-prompt -I "#W" "rename-window -- \"%%\""' \
  'Kill Window'              x 'confirm-before -p "Kill window #W? (y/n)" kill-window'
bind -n IC display-menu -T '#[fg=#e91e63,bold] Actions ' -x 0 -y S \
  'Prev Window'              p 'previous-window' \
  'Next Window'              n 'next-window' \
  '' \
  'Window 1'                 1 'select-window -t 1' \
  'Window 2'                 2 'select-window -t 2' \
  'Window 3'                 3 'select-window -t 3' \
  'Window 4'                 4 'select-window -t 4' \
  'Window 5'                 5 'select-window -t 5' \
  'Window 6'                 6 'select-window -t 6' \
  'Window 7'                 7 'select-window -t 7' \
  'Window 8'                 8 'select-window -t 8' \
  '' \
  'Rename Window'            r 'command-prompt -I "#W" "rename-window -- \"%%\""' \
  'Kill Window'              x 'confirm-before -p "Kill window #W? (y/n)" kill-window'

# fcitx5 input method context switching
set-hook -g pane-focus-out "run-shell '$HOME/scripts/fcitx5-tmux-hook focus-out #{pane_id}'"
set-hook -g pane-focus-in "run-shell '$HOME/scripts/fcitx5-tmux-hook focus-in #{pane_id}'"
set-hook -g popup-open "run-shell '$HOME/scripts/fcitx5-tmux-hook popup-open #{pane_id}'"
set-hook -g popup-close "run-shell '$HOME/scripts/fcitx5-tmux-hook popup-close #{pane_id}'"
